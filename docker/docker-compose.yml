services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: temporal
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  temporal:
    image: temporalio/auto-setup:latest
    depends_on:
      - postgres
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: /etc/temporal/config/dynamicconfig/development.yaml
    ports:
      - "7233:7233"
      - "8233:8233"
    volumes:
      - ./temporal-dynamicconfig:/etc/temporal/config/dynamicconfig

  api:
    build:
      context: ..
      dockerfile: src/TemporalAiScribe.Api/Dockerfile
    depends_on:
      - temporal
      - postgres
    ports:
      - "5000:8080"

  worker:
    build:
      context: ..
      dockerfile: src/TemporalAiScribe.Worker/Dockerfile
    depends_on:
      - temporal
      - postgres

volumes:
  postgres-data:
